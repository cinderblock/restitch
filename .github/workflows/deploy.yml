name: Deploy

on:
  push:
    branches: [master]
    paths:
      - src/**
      - containers/restitch/**
      - servers/**
      - package.json
      - bun.lock
      - tsconfig.json
      - .github/workflows/deploy.yml
  workflow_dispatch:

# Single self-hosted job: bootstrap → build → compose up. The image stays
# on sentinel's local docker layer cache; no GHCR push/pull, no bundle
# artifact, no separate jobs. Build uses sentinel's 24 cores + GPU for
# fast iteration.
jobs:
  deploy:
    runs-on: [self-hosted, sentinel]
    concurrency:
      group: deploy-sentinel-restitch
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - name: Bootstrap + build + deploy
        run: bash servers/sentinel/deploy.sh
