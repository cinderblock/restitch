name: Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - src/**
      - containers/restitch/**
      - servers/**
      - package.json
      - bun.lock
      - tsconfig.json
      - .github/workflows/deploy.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # 1. Build + push the restitch container image
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          SHA_TAG="sha-${GITHUB_SHA::12}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "Will tag image as ${SHA_TAG} and latest"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/restitch/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/restitch:${{ steps.meta.outputs.sha_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/restitch:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/restitch:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/restitch:buildcache,mode=max

  # 2. Make sure the self-hosted runner on sentinel is online; if not,
  #    print registration instructions and wait (up to 60 minutes).
  ensure-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Check / register runner
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.RUNNER_ADMIN_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const serverLabel = 'sentinel';
            const { data } = await github.rest.actions.listSelfHostedRunnersForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const runner = data.runners.find(r =>
              r.labels.some(l => l.name === serverLabel)
            );
            if (runner && runner.status === 'online') {
              console.log(`✓ Runner '${serverLabel}' is online (id ${runner.id})`);
              return;
            }
            if (runner) {
              console.log(`Runner '${serverLabel}' is ${runner.status} — removing stale registration (id ${runner.id})`);
              await github.rest.actions.deleteSelfHostedRunnerFromRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                runner_id: runner.id,
              });
            }

            // Mint a registration token + print setup instructions, then wait.
            const { data: tok } = await github.rest.actions.createRegistrationTokenForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const { data: rel } = await github.rest.repos.getLatestRelease({
              owner: 'actions', repo: 'runner',
            });
            const v = rel.tag_name.replace(/^v/, '');
            console.log('Runner missing or offline. Provisioning is normally handled by');
            console.log('the jackson ops workflow (install-restitch-runner job). To do it');
            console.log('by hand, ssh to sentinel as cameron and run:');
            console.log('');
            console.log(`RUNNER_VERSION=${v} && mkdir -p ~/actions-runner-restitch && cd ~/actions-runner-restitch && curl -sL https://github.com/actions/runner/releases/download/v\${RUNNER_VERSION}/actions-runner-linux-x64-\${RUNNER_VERSION}.tar.gz | tar xz && ./config.sh --unattended --replace --url https://github.com/${context.repo.owner}/${context.repo.repo} --token ${tok.token} --name sentinel-restitch --labels sentinel,self-hosted && sudo ./svc.sh install && sudo ./svc.sh start`);
            console.log('');
            console.log('Waiting up to 60 minutes...');

            const deadline = Date.now() + 60 * 60 * 1000;
            while (Date.now() < deadline) {
              const { data: d } = await github.rest.actions.listSelfHostedRunnersForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
              });
              const r = d.runners.find(rr => rr.labels.some(l => l.name === serverLabel));
              if (r && r.status === 'online') {
                console.log(`✓ Runner '${serverLabel}' is online`);
                return;
              }
              await new Promise(res => setTimeout(res, 10_000));
            }
            core.setFailed(`Runner '${serverLabel}' never came online`);

  # 3. Build the deployment bundle (resolves image version into compose)
  build-bundle:
    needs: [build-image, ensure-runner]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run build.sh
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          RESTITCH_VERSION: ${{ needs.build-image.outputs.image_sha_tag }}
        run: |
          mkdir -p /tmp/bundle
          bash servers/sentinel/build.sh /tmp/bundle

      - uses: actions/upload-artifact@v7
        with:
          name: deployment-bundle-sentinel
          path: /tmp/bundle
          retention-days: 1
          if-no-files-found: error

  # 4. Deploy on the self-hosted runner
  deploy:
    needs: [build-bundle, ensure-runner]
    runs-on: [self-hosted, sentinel]
    concurrency:
      group: deploy-sentinel-restitch
      cancel-in-progress: true
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: deployment-bundle-sentinel
          path: /tmp/deployment-bundle

      - name: Run deploy.sh
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        working-directory: /tmp/deployment-bundle
        run: bash deploy.sh
